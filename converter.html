<!DOCTYPE html>
<html>
<head>
<title>Array Formatter</title>

<style>
body{
    font-family: monospace;
    background:#111;
    color:white;
    padding:20px;
}

textarea{
    width:100%;
    height:200px;
    background:#222;
    color:white;
    border:none;
    padding:10px;
}

button{
    padding:10px 20px;
    margin-top:10px;
}

#output{
    white-space:pre;
    margin-top:20px;
    background:#000;
    padding:10px;
}
</style>
</head>

<body>

<h2>Array Formatter</h2>

<textarea id="input" placeholder="Paste messy array here"></textarea>
<br>
<button onclick="formatArray()">Format</button>

<pre id="output"></pre>

<script>

function formatArray(){

    let text = document.getElementById("input").value;

    try{

        let arr = JSON.parse(text);

        let formatted = "[\n";

        for(let i=0;i<arr.length;i++){
            formatted += "  [" + arr[i].join(", ") + "]";
            
            if(i < arr.length-1)
                formatted += ",";
                
            formatted += "\n";
        }

        formatted += "]";

        document.getElementById("output").textContent = formatted;

    }catch(e){
        document.getElementById("output").textContent = "Invalid array!";
    }

}

</script>

</body>
</html>
